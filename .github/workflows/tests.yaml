name: Testing and validation

on:
  - pull_request
  - push

permissions: read-all

jobs:
  test:
    name: Test and validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Check yaml files comply to schema
      - name: Check YAML schema
        run: |
          curl -L https://github.com/neilpa/yajsv/releases/download/v1.4.0/yajsv.linux.amd64 > yajsv
          chmod +x yajsv
          ./yajsv -s schema.json sites/*.yaml
      # Python
      - name: "Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Install the project
        run: |
          uv sync --locked --all-groups
      - name: Run tests
        run: |
          uv run py.test --cov=fedcloud_catchall --cov-report=xml --cov-report=term-missing src/fedcloud_catchall/
      # Validation
      - name: Validate GOC and VOs
        run: |
          alias yq="uv run yq"
          ./validate.sh
