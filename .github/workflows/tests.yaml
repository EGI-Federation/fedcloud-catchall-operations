name: Testing and validation

on:
  - pull_request
  - push

permissions: read-all

jobs:
  test:
    name: Test and validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # Check yaml files comply to schema
      - name: Check YAML schema
        run: |
          curl -L https://github.com/neilpa/yajsv/releases/download/v1.4.0/yajsv.linux.amd64 > yajsv
          chmod +x yajsv
          ./yajsv -s schema.json sites/*.yaml
      # Python
      - name: "Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install the project
        run: |
          uv sync --locked --all-groups
      - name: Run tests
        run: |
          uv run py.test --cov=fedcloud_catchall --cov-report=xml --cov-report=term-missing src/fedcloud_catchall/
      # Validation
      - name: Validate GOC and VOs
        run: |
          alias yq="uv run yq"
          ./validate.sh
