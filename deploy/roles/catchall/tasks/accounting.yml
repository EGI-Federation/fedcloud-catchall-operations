---
- name: Spool dir
  ansible.builtin.file:
    path: "/var/spool/egi/"
    state: directory
    mode: "755"
    owner: "{{ egi_user }}"
    group: "{{ egi_group }}"

- name: Certs dir
  ansible.builtin.file:
    path: "/etc/grid-security/"
    state: directory
    mode: "755"
    owner: "{{ egi_user }}"
    group: "{{ egi_group }}"

- name: Create certificate file
  ansible.builtin.copy:
    dest: "/etc/grid-security/hostcert.pem"
    content: "{{ hostcert }}"
    mode: "660"

- name: Create key file
  ansible.builtin.copy:
    dest: "/etc/grid-security/hostkey.pem"
    content: "{{ hostkey }}"
    mode: "660"

- name: caso cron
  ansible.builtin.cron:
    name: caso
    weekday: "{{ accounting_cron.weekday }}"
    minute: "{{ accounting_cron.minute }}"
    hour: "{{ accounting_cron.hour }}"
    user: root
    job: >
      flock -n -w {{ accounting_cron.timeout }} /var/lock/sync
      docker run --rm -v /etc/egi:/etc/egi:ro
      -v {{ site_config_dir }}:{{ site_config_mountpoint }}:ro
      -v /var/spool/egi:/var/spool/egi
      -v /etc/grid-security/cert/hostkey.pem:/etc/grid-security/hostkey.pem
      -v /etc/grid-security/hostcert.pem:/etc/grid-security/hostcert.pem
      {{ accounting_image }} accounting
      --config-dir /etc/egi >> /var/log/accounting.log 2>&1
    cron_file: "egi-accounting"

- name: record cleaner cron
  ansible.builtin.cron:
    name: caso
    weekday: "{{ record_cleaner_cron.weekday }}"
    minute: "{{ record_cleaner_cron.minute }}"
    hour: "{{ record_cleaner_cron.hour }}"
    user: root
    job: >
      flock -n -w {{ record_cleaner_cron.timeout }} /var/lock/sync
      docker run --rm -v /etc/egi:/etc/egi:ro
      -v {{ site_config_dir }}:{{ site_config_mountpoint }}:ro
      -v /var/spool/egi:/var/spool/egi
      {{ accounting_image }} record-cleaner
      --config-dir /etc/egi >> /var/log/cleaner.log 2>&1
    cron_file: "egi-accounting-cleaner"
